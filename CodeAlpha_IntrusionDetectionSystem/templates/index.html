<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cyber IDS Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="background"></div>

<div class="container">

    <h1>🛡 AI Network Intrusion Detection System</h1>

    <div class="stats">

        <div class="card">
            <h2 id="packetCount">0</h2>
            <p>Total Packets</p>
        </div>

        <div class="card danger">
            <h2 id="threatCount">0</h2>
            <p>Total Threats</p>
        </div>

        <div class="card high-card">
            <h2 id="highCount">0</h2>
            <p>High Severity</p>
        </div>

        <div class="card medium-card">
            <h2 id="mediumCount">0</h2>
            <p>Medium Severity</p>
        </div>

    </div>

    <div class="chart-container">
        <canvas id="threatChart"></canvas>
    </div>

    <div class="alerts-section">

        <h2>🚨 Live Threat Alerts</h2>

        <table>

            <thead>
                <tr>
                    <th>Source IP</th>
                    <th>Threat Type</th>
                    <th>Severity</th>
                </tr>
            </thead>

            <tbody id="alertsBody"></tbody>

        </table>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
